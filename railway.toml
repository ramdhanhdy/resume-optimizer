[build]
builder = "RAILPACK"
watchPatterns = [
  "/backend/**",
  "/requirements.txt",
  "/runtime.txt",
  "/railway.toml",
  "/docs/deployment_railway_runbook_2026-05-09.md",
  "/DEPLOYMENT.md",
  "/README.md"
]

[deploy]
startCommand = "cd backend && exec python -m uvicorn server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
