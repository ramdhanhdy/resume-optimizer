[build]
builder = "RAILPACK"
watchPatterns = [
  "/backend/**",
  "/docs/deployment_railway_runbook_2026-05-09.md",
  "/DEPLOYMENT.md",
  "/README.md"
]

[deploy]
startCommand = "sh -c 'if [ -f server.py ]; then exec uvicorn server:app --host 0.0.0.0 --port $PORT; else cd backend && exec uvicorn server:app --host 0.0.0.0 --port $PORT; fi'"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
